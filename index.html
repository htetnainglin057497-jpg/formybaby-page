<!DOCTYPE html>
<html>
<head>
  <title>Just One Question 💙</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #d0f0ff;
      padding-top: 50px;
      overflow: hidden;
    }

    h1 {
      color: #0077b6;
      font-size: 40px;
    }

    img {
      width: 200px;
      margin: 20px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #yes {
      background-color: #0077b6;
      color: white;
    }

    #no {
      background-color: #90caf9;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>Do you miss me? 💙😘</h1>

  <img src="https://media.tenor.com/kBV_1Td-2kgAAAAi/mocha-milk.gif">

  <br>

  <button id="yes" onclick="showLove()">Yes 🥰</button>
  <button id="no" onmouseover="moveButton()">No 🫣</button>

  <audio id="bg-music" loop>
    <source src="The 1975 - About You (Official).mp3" type="audio/mpeg">
  </audio>

<script>
function showLove() {
  // Change content
  document.body.innerHTML = `
    <h1>I miss you more 💙🥰</h1>
    <img src="https://media1.tenor.com/m/1sllEEYLrrAAAAAC/happy-janmashtami.gif" width="200"><br><br>

    <audio controls autoplay loop>
      <source src="The 1975 - About You (Official).mp3" type="audio/mpeg">
    </audio>
  `;

  // Floating hearts start AFTER clicking Yes
  setInterval(() => {
    const heart = document.createElement("div");
    heart.innerHTML = "💙";
    heart.style.position = "fixed";
    heart.style.bottom = "-10px";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animation = "floatUp 5s linear";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);

  // animation style
  const style = document.createElement("style");
  style.innerHTML = `
    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
}

function moveButton() {
  const btn = document.getElementById("no");
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
